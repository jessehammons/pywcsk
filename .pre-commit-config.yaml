repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        name: markdownlint (spec files)
        files: '^\.specify/memory/.*\.md$'
        args: ["--config", ".specify/memory/.markdownlint.yaml"]

  - repo: local
    hooks:
      - id: check-spec-integrity
        name: check spec integrity
        entry: python3 .specify/scripts/check_spec_integrity.py
        language: system
        files: '^\.specify/memory/.*\.md$'
        pass_filenames: true

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        additional_dependencies: [
          flake8-bugbear,
          flake8-comprehensions,
          flake8-docstrings,
          flake8-import-order,
          flake8-quotes,
          pep8-naming,
        ]

  - repo: https://github.com/pycqa/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # Keep in sync with pyproject.toml [project.dependencies]
        additional_dependencies: [click]
